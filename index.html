<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cat Facts 🐱 zif.my.id</title>
  <link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@300;400;700&family=Gowun+Batang:wght@400;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/bodymovin/5.12.2/lottie.min.js"></script>
</head>
<body>

<!-- Paw cursor -->
<div id="pawCursor">🐾</div>

<!-- Night toggle -->
<button id="nightToggle">🌙 night</button>

<!-- Snore overlay -->
<div id="snoreOverlay"></div>
<div id="snoreMsg">z z z z z<br>tap anywhere to wake</div>

<!-- Achievement toast -->
<div id="achievementToast"></div>

<!-- Doodles -->
<div class="doodles" id="doodleContainer"></div>

<!-- Header -->
<div class="header">
  <div class="header-eyebrow">✦ a tiny curiosity ✦</div>
  <div class="header-title">Cat Facts!</div>
  <div class="header-sub">
    by <a href="https://zif.my.id">zif.my.id</a> · powered by catfact.ninja
  </div>
</div>

<!-- Card -->
<div class="card">
  <div class="corner corner-tl"></div>
  <div class="corner corner-tr"></div>
  <div class="corner corner-bl"></div>
  <div class="corner corner-br"></div>

  <!-- Cat -->
  <div class="cat-section">
    <p class="pet-hint" id="petHint">✦ click or hold to pet the cat ✦</p>
    <div id="catWrap">
      <div id="purrLabel">…z z z ♡</div>
      <div id="sleepLabel">z z z</div>
      <div id="lottieContainer"></div>
      <button id="tunaBtn">🐟 tuna?</button>
      <button id="yarnBtn">🧶 yarn?</button>
    </div>
    <div id="stateBadge">sleeping…</div>
    <div class="commentary" id="commentary"></div>
  </div>

  <!-- Fact bubble -->
  <div class="bubble-section">
    <div class="bubble-label">fact of the moment</div>
    <div class="bubble">
      <p class="fact-text" id="factText">Fetching a purrfect fact…</p>
    </div>
    <div class="bubble-actions">
      <button class="btn-copy" id="copyBtn">✦ copy</button>
      <button class="btn-fav"  id="favThisBtn">⭐ favourite</button>
    </div>
  </div>

  <!-- Meta -->
  <div class="meta-row">
    <span class="meta-tag" id="tagLength">— chars</span>
    <span style="font-size:18px;">🐾</span>
    <span class="meta-tag" id="tagCount">#0</span>
  </div>

  <!-- New fact -->
  <button class="btn" id="newFactBtn">
    <span class="btn-icon">🐾</span>
    <div class="btn-spinner"></div>
    <span>New Fact, please!</span>
  </button>

  <!-- Stats -->
  <div class="stats">
    <div class="stat">
      <div class="stat-val" id="countVal">0</div>
      <div class="stat-lbl">Facts read</div>
    </div>
    <div class="stat">
      <div class="stat-val" id="petsVal">0</div>
      <div class="stat-lbl">Times petted</div>
    </div>
    <div class="stat">
      <div class="stat-val" id="moodVal">😒</div>
      <div class="stat-lbl">Mood</div>
    </div>
  </div>

  <!-- Panel buttons -->
  <div class="panel-btns">
    <button id="favBtn">✦ favourites</button>
    <span>·</span>
    <button id="achievementsBtn">✦ achievements</button>
  </div>

  <!-- Favourites panel -->
  <div id="favPanel">
    <div class="fav-list" id="favList"></div>
  </div>

  <!-- Achievements panel -->
  <div id="achievementsPanel">
    <div class="achievement-grid" id="achievementGrid"></div>
  </div>

</div><!-- /card -->

<div class="footer">✦ zif.my.id · catfact.ninja ✦</div>

<script type="module" src="app.js"></script>
</body>
</html>
